<svg xmlns="http://www.w3.org/2000/svg" width="160" height="36" viewBox="0 0 160 36">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Chart bars icon -->
  <rect x="2" y="18" width="5" height="14" rx="1.5" fill="url(#g)" opacity="0.7"/>
  <rect x="10" y="10" width="5" height="22" rx="1.5" fill="url(#g)" opacity="0.85"/>
  <rect x="18" y="14" width="5" height="18" rx="1.5" fill="url(#g)"/>
  <!-- Trend line -->
  <polyline points="4,16 13,8 21,12 30,4" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at tip -->
  <circle cx="30" cy="4" r="2.5" fill="#06b6d4"/>
  <!-- Text -->
  <text x="40" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="white" letter-spacing="-0.3">Options</text>
  <text x="108" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="url(#g)" letter-spacing="-0.3">Flow</text>
</svg>
